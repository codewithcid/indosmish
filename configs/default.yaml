# IndoSmish default configuration
seed: 42

paths:
  raw: data/raw
  interim: data/interim
  processed: data/processed
  splits: data/processed/splits
  results: results

labels:
  ham: 0
  spam: 1
  smishing: 2

# Column mappings for raw source files (adjust after inspecting actual downloads)
sources:
  dravidian_spam:                      # Ramanujam & Abirami, IEEE DataPort
    file: data/raw/dravidian_spam.csv
    text_col: Message
    label_col: Label                   # expects values like spam/ham
    lang: ml                           # filter to Malayalam rows in build_corpus
  sms_phishing:                        # Mishra & Soni tri-class, Mendeley
    file: data/raw/sms_phishing.csv
    text_col: TEXT
    label_col: LABEL                   # ham/spam/smishing

split:
  train: 0.70
  val: 0.15
  test: 0.15

augment:
  model: gemini-2.0-flash              # free tier
  per_seed: 3                          # variants per seed smishing message
  max_seeds: 400
  out: data/interim/augmented_pending_review.jsonl

encoder:
  max_length: 128
  batch_size: 16
  grad_accum: 1
  lr: 2.0e-5
  epochs: 4
  fp16: true
  models:
    muril: google/muril-base-cased
    indicbert: ai4bharat/indic-bert

slm:
  base: Qwen/Qwen2.5-1.5B-Instruct
  few_shot_k: 8
  qlora:
    r: 16
    alpha: 32
    dropout: 0.05
    lr: 2.0e-4
    epochs: 3

profiling:
  warmup_messages: 20
  timed_messages: 200
