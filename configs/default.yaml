# IndoSmish default configuration
seed: 42

paths:
  raw: data/raw
  interim: data/interim
  processed: data/processed
  splits: data/processed/splits
  results: results

labels:
  ham: 0
  spam: 1
  smishing: 2

# Column mappings for raw source files (adjust after inspecting actual downloads).
# kind: tri_class  -> generic ham/spam/smishing loader
# kind: codemix_ham -> DravidianCodeMix; only Not_offensive rows, mapped to ham
sources:
  sms_phishing:                        # Mishra & Soni tri-class, Mendeley (REQUIRED)
    kind: tri_class
    file: data/raw/sms_phishing.csv
    text_col: TEXT
    label_col: LABEL                   # ham/spam/smishing
  uci_sms:                             # UCI SMS Spam Collection (auto-fetched)
    kind: tri_class
    file: data/raw/uci_sms.csv
    text_col: text
    label_col: label                   # ham/spam
  dravidian_codemix:                   # DravidianCodeMix Ml-En (auto-fetched)
    kind: codemix_ham
    file: data/raw/dravidian_codemix_ml.csv
    text_col: text
    label_col: label                   # Not_offensive -> ham
    max_ham: 1500                       # cap real code-mixed ham to keep balance

# How much English spam to Gemini-transform into code-mix (register balance). 0 = off.
codemix_spam:
  from_english_spam: 200

# Corpus balancing (applied in build_corpus after merge). Prevents redundant English
# ham from swamping the minority classes. All native-script (code-mixed) ham is kept;
# roman ham is sampled down to reach max_ham. null = keep everything.
balance:
  max_ham: 3000

split:
  train: 0.70
  val: 0.15
  test: 0.15

augment:
  model: gemini-flash-latest           # free tier (verified working on this key)
  per_seed: 3                          # variants per seed smishing message
  max_seeds: 250
  rpm_sleep: 4.0                       # seconds between calls (free-tier RPM guard)
  out: data/interim/augmented_pending_review.jsonl

encoder:
  max_length: 128
  batch_size: 16
  grad_accum: 1
  lr: 2.0e-5
  epochs: 4
  fp16: true
  models:
    muril: google/muril-base-cased
    indicbert: ai4bharat/indic-bert

slm:
  base: Qwen/Qwen2.5-1.5B-Instruct
  few_shot_k: 8
  qlora:
    r: 16
    alpha: 32
    dropout: 0.05
    lr: 2.0e-4
    epochs: 3

profiling:
  warmup_messages: 20
  timed_messages: 200
